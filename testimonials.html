<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Testimonials — The Mindgem | Client Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#FFF4E9;font-family:'DM Sans',sans-serif;font-weight:300;color:#1A0A0A;overflow-x:hidden;}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:88px;display:flex;align-items:center;justify-content:space-between;
  padding:0 80px;
  background:rgba(10,5,3,0.45);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.nav::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;background:rgba(255,0,0,0.2);
}
.nav-logo{display:flex;align-items:center;text-decoration:none;}
.nav-logo img{height:48px;width:auto;display:block;}
.nav-logo-text{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:#FFF4E9;}
.nav-links{display:flex;gap:48px;list-style:none;position:absolute;left:50%;transform:translateX(-50%);}
.nav-links a{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;
  color:rgba(255,244,233,0.8);text-decoration:none;
  letter-spacing:0.14em;text-transform:uppercase;
  transition:color 0.25s;position:relative;padding-bottom:4px;
}
.nav-links a:hover{color:#FF0000;}
.nav-links a.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;background:#FF0000;
}
.btn-book{
  background:transparent;color:#FFF4E9;
  border:1px solid rgba(255,244,233,0.5);
  padding:10px 22px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;white-space:nowrap;
}
.btn-book:hover{background:#FF0000;border-color:#FF0000;color:#fff;}
/* ── HAMBURGER ── */
.nav-hamburger{
  display:none;flex-direction:column;justify-content:center;gap:5px;
  background:none;border:none;cursor:pointer;padding:8px;min-width:44px;min-height:44px;
}
.nav-hamburger span{display:block;width:22px;height:2px;background:rgba(255,244,233,0.7);transition:transform 0.3s,opacity 0.2s;}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
/* ── MOBILE OVERLAY ── */
.mobile-menu{
  display:none;position:fixed;inset:0;
  background:rgba(26,10,10,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:99;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 40px 60px;
  transform:translateY(-100%);opacity:0;
  transition:transform 0.4s ease,opacity 0.4s ease;
}
.mobile-menu.open{display:flex;transform:none;opacity:1;}
.mobile-close{
  position:absolute;top:28px;right:28px;background:none;border:none;
  color:rgba(255,244,233,0.4);font-family:'DM Sans',sans-serif;font-size:24px;
  cursor:pointer;line-height:1;padding:8px;
}
.mobile-logo-wrap{position:absolute;top:24px;left:40px;}
.mobile-logo-wrap img{height:48px;width:auto;display:block;}
.mobile-logo-text{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:#FFF4E9;text-decoration:none;}
.mobile-menu-links{display:flex;flex-direction:column;align-items:center;gap:36px;list-style:none;}
.mobile-menu-links a{font-family:'Playfair Display',serif;font-size:40px;font-weight:400;color:#FFF4E9;text-decoration:none;transition:color 0.2s;}
.mobile-menu-links a:hover{color:#FF0000;}
.btn-book-mobile{margin-top:48px;background:#FF0000;color:#fff;border:none;width:100%;padding:18px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;border-radius:2px;text-align:center;}
.btn-book-mobile{margin-top:48px;background:#FF0000;color:#fff;border:none;width:100%;padding:18px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;border-radius:2px;text-align:center;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(44px);}to{opacity:1;transform:none;}}
@keyframes redBar{from{transform:scaleX(0);}to{transform:scaleX(1);}}

/* ── SCROLL REVEALS ── */
.fade-in{opacity:0;transform:translateY(32px);transition:opacity 0.75s cubic-bezier(0.22,1,0.36,1),transform 0.75s cubic-bezier(0.22,1,0.36,1);}
.fade-in.visible{opacity:1;transform:none;}
.fade-left{opacity:0;transform:translateX(40px);transition:opacity 0.75s cubic-bezier(0.22,1,0.36,1),transform 0.75s cubic-bezier(0.22,1,0.36,1);}
.fade-left.visible{opacity:1;transform:none;}
.hero-anim{opacity:0;animation:fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) forwards;}
.hero-anim-1{animation-delay:0.1s;}
.hero-anim-2{animation-delay:0.3s;}
.hero-anim-3{animation-delay:0.5s;}
.hero-anim-4{animation-delay:0.7s;}

/* ── SECTION 1: HERO ── */
.hero-section{
  background:#FFF4E9;
  padding:200px 60px 140px;
  text-align:center;
}
.eyebrow{font-size:12px;font-weight:500;color:#FF0000;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:24px;}
.hero-headline{font-family:'Playfair Display',serif;font-size:clamp(40px,6vw,72px);line-height:1.06;color:#1A0A0A;font-weight:600;}
.hero-headline em{color:#FF0000;font-style:italic;display:block;}
.hero-sub{font-size:18px;font-weight:300;color:rgba(26,10,10,0.6);line-height:1.8;margin:32px auto 44px;max-width:520px;}
.btn-red-hero{background:#FF0000;color:#fff;border:none;padding:18px 40px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;letter-spacing:0.03em;cursor:pointer;transition:background 0.2s,transform 0.15s;min-height:56px;}
.btn-red-hero:hover{background:#cc0000;transform:translateY(-2px);}

/* ── SECTION 2: VIDEO ── */
.video-section{background:#FEFAF5;padding:120px 60px;}
.section-inner{max-width:1100px;margin:0 auto;text-align:center;}
.section-headline{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,52px);color:#1A0A0A;font-weight:600;line-height:1.15;margin-bottom:0;}
.video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:56px;text-align:left;}
.video-card{background:#fff;border:1px solid rgba(26,10,10,0.08);overflow:hidden;transition:box-shadow 0.3s,transform 0.3s;}
.video-card:hover{box-shadow:0 12px 40px rgba(26,10,10,0.1);transform:translateY(-4px);}
.video-thumb{position:relative;aspect-ratio:16/9;background:#1A0A0A;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
.video-thumb::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(254,250,245,0.015) 0,rgba(254,250,245,0.015) 1px,transparent 1px,transparent 28px);}
.video-thumb-overlay{position:absolute;inset:0;background:rgba(26,10,10,0.45);}
.play-btn{position:relative;z-index:2;width:64px;height:64px;border-radius:50%;background:rgba(254,250,245,0.92);display:flex;align-items:center;justify-content:center;transition:transform 0.2s,background 0.2s;}
.video-card:hover .play-btn{transform:scale(1.1);background:#fff;}
.play-icon{width:0;height:0;border-style:solid;border-width:10px 0 10px 20px;border-color:transparent transparent transparent #FF0000;margin-left:4px;}
.video-info{padding:20px 24px 24px;}
.video-name{font-size:16px;font-weight:500;color:#1A0A0A;margin-bottom:4px;}
.video-role{font-size:14px;font-weight:300;color:rgba(26,10,10,0.6);}

/* ── SECTION 3: DARK BRIDGE ── */
.bridge-section{background:#1A0A0A;padding:120px 60px;text-align:center;}
.bridge-q{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(32px,4.5vw,52px);color:#FEFAF5;line-height:1.2;}
.bridge-body{font-size:18px;font-weight:300;color:rgba(254,250,245,0.6);line-height:1.8;margin:24px auto 0;max-width:560px;}
.btn-red-inv{background:#FF0000;color:#fff;border:none;padding:18px 40px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;letter-spacing:0.03em;cursor:pointer;transition:background 0.2s,transform 0.15s;margin-top:40px;display:inline-block;min-height:56px;}
.btn-red-inv:hover{background:#cc0000;transform:translateY(-2px);}

/* ── SECTION 4: WRITTEN TESTIMONIALS ── */
.written-section{background:#FFF4E9;padding:120px 60px;}
.section-sub{font-size:16px;font-weight:300;color:rgba(26,10,10,0.6);line-height:1.75;margin:16px auto 0;max-width:560px;text-align:center;}
.tcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:56px;}
.tcard{background:#fff;border:1px solid rgba(26,10,10,0.08);padding:40px 36px;display:flex;flex-direction:column;transition:box-shadow 0.3s,transform 0.3s;}
.tcard:hover{box-shadow:0 12px 40px rgba(26,10,10,0.08);transform:translateY(-4px);}
.tcard-stars{color:#FF0000;font-size:14px;letter-spacing:4px;margin-bottom:16px;}
.tcard-bigquote{font-family:'Playfair Display',serif;font-size:80px;color:rgba(255,0,0,0.12);line-height:0.7;margin-bottom:16px;display:block;}
.tcard-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:#3D2A2A;line-height:1.7;flex:1;}
.tcard-author{display:flex;align-items:center;gap:14px;margin-top:28px;}
.tcard-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,0,0,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tcard-initials{font-family:'Playfair Display',serif;font-size:16px;color:#FF0000;font-weight:600;}
.tcard-name{font-size:14px;font-weight:500;color:#1A0A0A;line-height:1.2;}
.tcard-role{font-size:13px;font-weight:300;color:#8A7A70;margin-top:2px;}
.cta-center{text-align:center;margin-top:52px;}
.btn-red-outline{background:none;border:2px solid #FF0000;color:#FF0000;padding:16px 40px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;min-height:72px;}
.btn-red-outline:hover{background:#FF0000;color:#fff;}

/* ── SECTION 5: WHY RESULTS ── */
.why-section{background:#FEFAF5;padding:120px 60px;text-align:center;}
.why-italic-lines{margin-top:32px;display:flex;flex-direction:column;gap:8px;}
.why-line{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(20px,2.8vw,28px);color:rgba(26,10,10,0.7);line-height:1.4;}
.statement-list{list-style:none;display:flex;flex-direction:column;gap:20px;margin:48px auto 0;max-width:560px;text-align:left;}
.statement-item{display:flex;align-items:flex-start;gap:16px;font-size:18px;font-weight:300;color:#1A0A0A;line-height:1.6;}
.statement-dot{color:#FF0000;font-size:20px;flex-shrink:0;line-height:1.4;}
.result-line{margin-top:48px;}
.result-text{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,3.5vw,36px);color:#FF0000;line-height:1.6;}

/* ── SECTION 6: FINAL CTA ── */
.final-cta{background:#1A0A0A;padding:140px 60px;text-align:center;}
.final-h{font-family:'Playfair Display',serif;font-size:clamp(36px,6vw,72px);color:#FEFAF5;font-weight:600;line-height:1.06;}
.final-h em{color:#FF0000;font-style:italic;display:block;}
.final-body{font-size:18px;font-weight:300;color:rgba(254,250,245,0.6);line-height:1.9;margin:24px auto 0;max-width:600px;}
.final-body strong{color:rgba(254,250,245,0.9);font-weight:400;}
.btn-final{background:#FF0000;color:#fff;border:none;padding:24px 80px;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:500;letter-spacing:0.04em;cursor:pointer;transition:background 0.2s,transform 0.2s;margin-top:48px;display:inline-block;min-height:72px;border-radius:2px;}
.btn-final:hover{background:#cc0000;transform:translateY(-3px);box-shadow:0 12px 40px rgba(255,0,0,0.3);}

/* ── FOOTER ── */
.footer{background:#1A0A0A;padding:80px 60px 40px;}
.footer-accent{height:3px;background:#FF0000;width:100%;margin-bottom:64px;transform-origin:left;animation:redBar 1.2s cubic-bezier(0.22,1,0.36,1) both;}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.4fr;gap:60px;max-width:1200px;margin:0 auto;}
.footer-logo{margin-bottom:16px;}
.footer-tagline{font-size:13px;font-weight:300;color:rgba(254,250,245,0.4);line-height:1.7;}
.footer-col-title{font-size:11px;font-weight:500;color:rgba(254,250,245,0.35);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:20px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:12px;}
.footer-links a{font-size:14px;font-weight:300;color:rgba(254,250,245,0.6);text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:#FF0000;}
.footer-newsletter p{font-size:13px;font-weight:300;color:rgba(254,250,245,0.5);line-height:1.6;margin-bottom:20px;}
.nl-row{display:flex;}
.nl-input{flex:1;background:rgba(254,250,245,0.06);border:1px solid rgba(254,250,245,0.12);padding:12px 16px;color:#FEFAF5;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.nl-input:focus{border-color:#FF0000;}
.nl-input::placeholder{color:rgba(254,250,245,0.25);}
.nl-btn{background:#FF0000;border:none;color:#fff;padding:12px 18px;font-size:13px;cursor:pointer;}
.nl-btn:hover{background:#cc0000;}
.footer-bottom{max-width:1200px;margin:56px auto 0;padding-top:28px;border-top:1px solid rgba(254,250,245,0.07);display:flex;justify-content:space-between;align-items:center;}
.footer-copy{font-size:12px;font-weight:300;color:rgba(254,250,245,0.28);}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  .hero-anim,.fade-in,.fade-left{animation:none!important;transition:none!important;opacity:1!important;transform:none!important;}
}

/* ── TABLET ── */
@media(max-width:1024px){
  .nav{padding:0 40px;}
  .hero-section{padding:160px 40px 100px;}
  .video-section,.written-section,.why-section,.bridge-section,.final-cta{padding:88px 40px;}
  .footer{padding:64px 40px 32px;}
  .footer-grid{grid-template-columns:1fr 1fr;gap:40px;}
}

/* ── MOBILE ── */
@media(max-width:768px){
  .nav{padding:0 24px;height:68px;}
  .nav-links,.btn-book{display:none;}
  .nav-hamburger{display:flex;}

  .hero-section{padding:120px 24px 88px;}
  .hero-headline{font-size:clamp(32px,9vw,52px);}
  .hero-sub{font-size:16px;}

  .video-section,.written-section,.why-section,.bridge-section,.final-cta{padding:72px 24px;}
  .video-grid,.tcard-grid{grid-template-columns:1fr;}
  .bridge-q{font-size:clamp(24px,6vw,40px);}
  .bridge-body,.final-body{font-size:16px;}
  .final-h{font-size:clamp(28px,8vw,48px);}
  .btn-final{padding:20px 48px;font-size:16px;}
  .section-headline{font-size:clamp(26px,6.5vw,40px);}
  .why-line{font-size:clamp(18px,5vw,24px);}

  .footer{padding:56px 24px 28px;}
  .footer-grid{grid-template-columns:1fr 1fr;gap:32px;}
  .footer-bottom{flex-direction:column;gap:12px;text-align:center;}
}

@media(max-width:480px){
  .hero-section{padding:100px 20px 72px;}
  .statement-list{padding:0 4px;}
  .btn-final{padding:18px 32px;width:100%;}
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useFadeIn() {
  useEffect(() => {
    const els = document.querySelectorAll('.fade-in,.fade-left');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }});
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav() {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const links = [['Home','index.html'],['About','about.html'],['Services','services.html'],['Testimonials','testimonials.html'],['Blog','#']];

  React.useEffect(() => {
    const h = () => { if(window.innerWidth > 768) setMenuOpen(false); };
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  React.useEffect(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [menuOpen]);

  const logoEl = window.__LOGO_IMG
    ? React.createElement('img', {src: window.__LOGO_IMG, alt: 'The Mindgem'})
    : React.createElement('span', {className: 'nav-logo-text'}, 'The Mindgem');

  const mobileLogoEl = window.__LOGO_IMG
    ? React.createElement('img', {src: window.__LOGO_IMG, alt: 'The Mindgem'})
    : React.createElement('span', {className: 'mobile-logo-text'}, 'The Mindgem');

  return (
    <>
      <nav className="nav" role="navigation" aria-label="Main navigation">
        <a className="nav-logo" href="index.html" aria-label="The Mindgem — Home">{logoEl}</a>
        <ul className="nav-links" role="list">
          {links.map(([label,href]) => (
            <li key={label}><a href={href} className={label==='Testimonials'?'active':''}>{label}</a></li>
          ))}
        </ul>
        <button className="btn-book" aria-label="Book a call">Book a Call</button>
        <button className={menuOpen?'nav-hamburger open':'nav-hamburger'} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen} onClick={()=>setMenuOpen(o=>!o)}>
          <span></span><span></span><span></span>
        </button>
      </nav>
      {menuOpen && (
        <div className="mobile-menu open" role="dialog" aria-label="Navigation menu">
          <div className="mobile-logo-wrap">{mobileLogoEl}</div>
          <button className="mobile-close" onClick={()=>setMenuOpen(false)}>&#x2715;</button>
          <ul className="mobile-menu-links">
            {links.map(([label,href]) => (
              <li key={label}><a href={href} onClick={()=>setMenuOpen(false)}>{label}</a></li>
            ))}
          </ul>
          <button className="btn-book-mobile" onClick={()=>setMenuOpen(false)}>Book a Call →</button>
        </div>
      )}
    </>
  );
}
